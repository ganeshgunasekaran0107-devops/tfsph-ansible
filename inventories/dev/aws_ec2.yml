---
plugin: amazon.aws.aws_ec2

regions:
  - ap-south-1

filters:
  instance-state-name: running
  tag:Project: tfsph
  tag:Environment: dev

hostnames:
  - private-ip-address

keyed_groups:
  - key: tags.Name
    prefix: tag_name
    separator: "_"

compose:
  ansible_host: instance_id
  ansible_connection: '"community.aws.aws_ssm"'
  ansible_aws_ssm_region: '"ap-south-1"'